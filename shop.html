<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAKOPUÉ | Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="lakopue_icon_transparent.png" type="image/png">
</head>
<body>
    <!-- Loader -->
    <div class="loader">
        <div class="loader-logo">
            <img src="lakopue_full_logo_cropped.png" alt="LAKOPUÉ">
        </div>
        <div class="loader-tagline">Beyond Elegance</div>
        <div class="loader-line"></div>
    </div>

    <!-- Shared Navigation -->
    <div data-include="nav"></div>

    <section class="shop-hero">
        <div class="shop-hero-inner">
            <p class="section-eyebrow">Shop</p>
            <h1 class="shop-hero-title">Curated Selection</h1>
            <p class="shop-hero-subtitle">A minimal demo storefront built into the LAKOPUÉ experience.</p>
        </div>
    </section>

    <section class="shop-section">
        <div class="shop-filters">
            <button class="shop-filter active" data-shop-filter="All">All</button>
            <button class="shop-filter" data-shop-filter="Haute Couture">Haute Couture</button>
            <button class="shop-filter" data-shop-filter="Ready-to-Wear">Ready-to-Wear</button>
            <button class="shop-filter" data-shop-filter="Jewelry">Jewelry</button>
            <button class="shop-filter" data-shop-filter="Accessories">Accessories</button>
            <button class="shop-filter" data-shop-filter="Shoes">Shoes</button>
        </div>

        <div class="shop-grid" data-shop-grid></div>
    </section>

    <!-- Shared Footer -->
    <div data-include="footer"></div>

    <script src="js/layout.js"></script>
    <script src="js/main.js"></script>
    <script src="js/store.js"></script>
</body>
</html>
